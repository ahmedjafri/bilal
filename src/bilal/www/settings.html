<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Azan Clock - Settings</title>
  <link rel="stylesheet" href="bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container-fluid">
      <div class="row">
        <div class="col-12 text-center mb-3 mt-3">
          <h1 class="settings-title">Azan Settings</h1>
        </div>
      </div>

      <div class="row mb-4">
        <div class="col-md-6 offset-md-3">
          <div class="card">
            <div class="card-body">
              <h3 class="card-title mb-3">Azan Audio</h3>

              <div class="form-group mb-3">
                <label for="azan-file-select">Select Azan Sound</label>
                <select class="form-control" id="azan-file-select">
                  <!-- Options will be populated by JavaScript -->
                </select>
              </div>

              <div class="text-center">
                <button class="btn btn-primary me-2" id="play-azan">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-play-fill" viewBox="0 0 16 16">
                    <path d="m11.596 8.697-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393z"/>
                  </svg>
                  Play
                </button>
                <button class="btn btn-danger" id="stop-azan">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-stop-fill" viewBox="0 0 16 16">
                    <path d="M5 3.5h6A1.5 1.5 0 0 1 12.5 5v6a1.5 1.5 0 0 1-1.5 1.5H5A1.5 1.5 0 0 1 3.5 11V5A1.5 1.5 0 0 1 5 3.5z"/>
                  </svg>
                  Stop
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="row mb-4">
        <div class="col-md-6 offset-md-3">
          <div class="card">
            <div class="card-body">
              <h3 class="card-title mb-3">Prayer Calculation Settings</h3>

              <div class="form-group mb-3">
                <label for="latitude">Latitude</label>
                <input type="number" step="0.0001" class="form-control" id="latitude" placeholder="e.g. 47.6740">
              </div>

              <div class="form-group mb-3">
                <label for="longitude">Longitude</label>
                <input type="number" step="0.0001" class="form-control" id="longitude" placeholder="e.g. -122.1215">
              </div>

              <div class="form-group mb-3">
                <label for="calculation-method">Calculation Method</label>
                <select class="form-control" id="calculation-method">
                  <!-- Options will be populated by JavaScript -->
                </select>
                <small class="form-text text-muted">Different methods are used in different regions of the world</small>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="row mb-4">
        <div class="col-md-6 offset-md-3">
          <div class="card">
            <div class="card-body">
              <h3 class="card-title mb-3">Quiet Hours</h3>

              <div class="form-group mb-3">
                <label for="quiet-start">Quiet Hours Start</label>
                <input type="time" class="form-control" id="quiet-start">
              </div>

              <div class="form-group mb-3">
                <label for="quiet-end">Quiet Hours End</label>
                <input type="time" class="form-control" id="quiet-end">
              </div>

              <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="quiet-hours-enabled">
                <label class="form-check-label" for="quiet-hours-enabled">
                  Enable Quiet Hours
                </label>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="row mb-4">
      <div class="col-md-6 offset-md-3">
        <div class="d-grid gap-2">
          <button id="save-settings" class="btn btn-primary btn-lg mb-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-save" viewBox="0 0 16 16">
              <path d="M2 1a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H9.5a1 1 0 0 0-1 1v7.293l2.646-2.647a.5.5 0 0 1 .708.708l-3.5 3.5a.5.5 0 0 1-.708 0l-3.5-3.5a.5.5 0 1 1 .708-.708L7.5 9.293V2a2 2 0 0 1 2-2H14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h2.5a.5.5 0 0 1 0 1H2z"/>
            </svg>
            Save Settings
          </button>
        </div>
      </div>
    </div>

    <div class="row mb-3">
      <div class="col-12 text-center">
        <button id="back-to-main" class="btn btn-secondary">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-left" viewBox="0 0 16 16">
            <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"/>
          </svg>
          Back to Prayer Times
        </button>
      </div>
    </div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
